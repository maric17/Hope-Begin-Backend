name: Build and Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hope-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/Hope-Begin-Backend
            # 1. Update environment variables
            echo "${{ secrets.BACKEND_ENV }}" > .env
            
            # 2. Pull the pre-built image
            docker compose pull backend
            
            # 3. Restart backend AND celery (they share the same image)
            # This ensures both pick up the new code and the new .env
            docker compose up -d backend celery
            
            # 4. Run migrations (always a good idea after a backend update)
            docker exec www-backend-1 python manage.py migrate --noinput
            
            # 5. Clean up old images to save disk space
            docker image prune -f